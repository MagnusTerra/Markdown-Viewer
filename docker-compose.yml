# PERF-035: Removed deprecated 'version' key (Docker Compose v2+ ignores it)

services:
  markdown-viewer:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    container_name: markdown-viewer
    restart: unless-stopped
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    depends_on:
      - pdf-service

  pdf-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    container_name: pdf-service
    restart: unless-stopped

